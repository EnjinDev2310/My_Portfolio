<div class="skills-grid max-w-xl mt-10 md:max-w-5xl grid grid-cols-[repeat(auto-fill,minmax(120px,1fr))] gap-4">
    @for (skill of skills; track skill.name) {
    <div
        class="skill-card flex flex-col items-center gap-2 p-5 pb-3 bg-surface border border-border rounded-xl transition-all duration-200 cursor-default hover:scale-110 hover:border-neon hover:shadow-neon-sm hover:-translate-y-1">
        <mat-icon [ngClass]="skill.class" [svgIcon]="skill.icon"></mat-icon>
        <span class="text-[0.85rem] font-medium text-text-secondary">{{ skill.name }}</span>
    </div>
    }
</div>
